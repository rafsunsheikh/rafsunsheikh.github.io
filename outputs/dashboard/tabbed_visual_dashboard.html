<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bangladesh Election Visual Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #f7f9fc 0%, #eef3ff 100%);
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
    }
    .dashboard-wrap {
      max-width: 1440px;
      margin: 16px auto;
      padding: 12px;
    }
    .title-bar {
      background: #1e293b;
      color: #fff;
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 12px;
    }
    .title-bar h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
    }
    .nav-tabs {
      border-bottom: 0;
      gap: 6px;
      flex-wrap: wrap;
    }
    .nav-tabs .nav-link {
      border: 0;
      border-radius: 10px;
      background: #e8eefc;
      color: #1e293b;
      font-weight: 600;
      padding: 8px 12px;
    }
    .nav-tabs .nav-link.active {
      background: #2563eb;
      color: #fff;
    }
    .tab-content {
      background: #fff;
      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
      min-height: 760px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }
    .viz-frame, .viz-object, .viz-image {
      width: 100%;
      height: 740px;
      border: 0;
      border-radius: 10px;
      background: #fff;
    }
    .viz-image {
      object-fit: contain;
      height: 740px;
    }
  </style>
</head>
<body>
  <div class="dashboard-wrap">
    <div class="title-bar">
      <h1>মানুষের মতামতের বিশ্লেষণ</h1>
    </div>
    <ul class="nav nav-tabs" id="vizTabs" role="tablist">
      <button class="nav-link active" id="tab-bangladesh-map" data-bs-toggle="tab" data-bs-target="#panel-bangladesh-map" type="button" role="tab" aria-controls="panel-bangladesh-map" aria-selected="true">Bangladesh Map</button><button class="nav-link " id="tab-bangladesh-sentiment-map" data-bs-toggle="tab" data-bs-target="#panel-bangladesh-sentiment-map" type="button" role="tab" aria-controls="panel-bangladesh-sentiment-map" aria-selected="false">Bangladesh Sentiment Map</button><button class="nav-link " id="tab-top-locations-overall" data-bs-toggle="tab" data-bs-target="#panel-top-locations-overall" type="button" role="tab" aria-controls="panel-top-locations-overall" aria-selected="false">Top Locations Overall</button><button class="nav-link " id="tab-top-locations-by-period" data-bs-toggle="tab" data-bs-target="#panel-top-locations-by-period" type="button" role="tab" aria-controls="panel-top-locations-by-period" aria-selected="false">Top Locations by Period</button><button class="nav-link " id="tab-sentiment-by-top-locations" data-bs-toggle="tab" data-bs-target="#panel-sentiment-by-top-locations" type="button" role="tab" aria-controls="panel-sentiment-by-top-locations" aria-selected="false">Sentiment by Top Locations</button><button class="nav-link " id="tab-text-sentiment-distribution" data-bs-toggle="tab" data-bs-target="#panel-text-sentiment-distribution" type="button" role="tab" aria-controls="panel-text-sentiment-distribution" aria-selected="false">Text Sentiment Distribution</button><button class="nav-link " id="tab-text-top-terms" data-bs-toggle="tab" data-bs-target="#panel-text-top-terms" type="button" role="tab" aria-controls="panel-text-top-terms" aria-selected="false">Text Top Terms</button><button class="nav-link " id="tab-topics-by-dataset" data-bs-toggle="tab" data-bs-target="#panel-topics-by-dataset" type="button" role="tab" aria-controls="panel-topics-by-dataset" aria-selected="false">Topics by Dataset</button><button class="nav-link " id="tab-text-length-distribution" data-bs-toggle="tab" data-bs-target="#panel-text-length-distribution" type="button" role="tab" aria-controls="panel-text-length-distribution" aria-selected="false">Text Length Distribution</button><button class="nav-link " id="tab-text-wordcloud" data-bs-toggle="tab" data-bs-target="#panel-text-wordcloud" type="button" role="tab" aria-controls="panel-text-wordcloud" aria-selected="false">Text Wordcloud</button>
    </ul>
    <div class="tab-content" id="vizTabsContent">
      <div class="tab-pane fade show active" id="panel-bangladesh-map" role="tabpanel" aria-labelledby="tab-bangladesh-map"><iframe src="../notebook_assets/bangladesh_interactive_location_map.html" class="viz-frame" loading="lazy"></iframe></div><div class="tab-pane fade " id="panel-bangladesh-sentiment-map" role="tabpanel" aria-labelledby="tab-bangladesh-sentiment-map"><iframe src="../notebook_assets/bangladesh_interactive_sentiment_map.html" class="viz-frame" loading="lazy"></iframe></div><div class="tab-pane fade " id="panel-top-locations-overall" role="tabpanel" aria-labelledby="tab-top-locations-overall"><object data="../location_analytics/dashboard/chart_top_locations_overall.svg" type="image/svg+xml" class="viz-object"></object></div><div class="tab-pane fade " id="panel-top-locations-by-period" role="tabpanel" aria-labelledby="tab-top-locations-by-period"><object data="../location_analytics/dashboard/chart_top_locations_by_period.svg" type="image/svg+xml" class="viz-object"></object></div><div class="tab-pane fade " id="panel-sentiment-by-top-locations" role="tabpanel" aria-labelledby="tab-sentiment-by-top-locations"><object data="../location_analytics/dashboard/chart_sentiment_top_locations.svg" type="image/svg+xml" class="viz-object"></object></div><div class="tab-pane fade " id="panel-text-sentiment-distribution" role="tabpanel" aria-labelledby="tab-text-sentiment-distribution"><img src="../election_text_analysis/plot_sentiment_distribution.png" class="viz-image" alt="Visualization"/></div><div class="tab-pane fade " id="panel-text-top-terms" role="tabpanel" aria-labelledby="tab-text-top-terms"><img src="../election_text_analysis/plot_top_terms.png" class="viz-image" alt="Visualization"/></div><div class="tab-pane fade " id="panel-topics-by-dataset" role="tabpanel" aria-labelledby="tab-topics-by-dataset"><iframe src="../election_text_analysis/topics_prevalence_by_dataset.html" class="viz-frame" loading="lazy"></iframe></div><div class="tab-pane fade " id="panel-text-length-distribution" role="tabpanel" aria-labelledby="tab-text-length-distribution"><img src="../election_text_analysis/plot_length_distribution.png" class="viz-image" alt="Visualization"/></div><div class="tab-pane fade " id="panel-text-wordcloud" role="tabpanel" aria-labelledby="tab-text-wordcloud"><img src="../election_text_analysis/plot_wordcloud.png" class="viz-image" alt="Visualization"/></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
